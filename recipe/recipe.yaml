context:
  version: "4.11.2"

package:
  name: cedar-policy-cli
  version: ${{ version }}

source:
  url: https://github.com/cedar-policy/cedar/archive/refs/tags/v${{ version }}.tar.gz
  sha256: ee8b8a15ce5df40a73f9aa2ce0fa7453b8f38b2544c043b4c30743e7bdfd32cb

build:
  number: 0
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
      - if: unix
        then:
          - cargo auditable install --locked --no-track --bins --root ${{ PREFIX }} --path cedar-policy-cli
        else:
          - cargo auditable install --locked --no-track --bins --root %LIBRARY_PREFIX% --path cedar-policy-cli
      - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-auditable
    - cargo-bundle-licenses

tests:
  - script:
      - cedar --help
  - package_contents:
      bin:
        - cedar
      strict: true

about:
  homepage: https://cedarpolicy.com
  summary: CLI interface for the Cedar Policy language
  description: |
    Cedar is a human-readable and human-written policy language designed for
    decentralized authorization decisions. The Cedar CLI provides a command-line
    interface for the Cedar Policy language.
  license: Apache-2.0
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  documentation: https://docs.cedarpolicy.com
  repository: https://github.com/cedar-policy/cedar

extra:
  recipe-maintainers:
    - swenger
    - xhochy
